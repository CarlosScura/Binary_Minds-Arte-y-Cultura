{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto mt-10 p-6 bg-gray-800 rounded-xl">
    <h2 class="text-2xl font-bold mb-6 text-white">Crear Evento</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="text-red-400 mb-4">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('eventos.crear_evento') }}" method="POST">
        <div class="mb-4">
            <label class="block text-gray-300 mb-1">Título:</label>
            <input type="text" name="titulo" required
                   class="w-full bg-gray-700 text-white px-3 py-2 rounded">
        </div>
        <div class="mb-4">
            <label class="block text-gray-300 mb-1">Descripción:</label>
            <textarea name="descripcion" required rows="4"
                      class="w-full bg-gray-700 text-white px-3 py-2 rounded"></textarea>
        </div>
        <div class="mb-4">
            <label class="block text-gray-300 mb-1">Fecha y hora:</label>
            <input type="datetime-local" name="fecha_evento" required
                   class="w-full bg-gray-700 text-white px-3 py-2 rounded">
        </div>
        <div class="mb-4">
            <label class="block text-gray-300 mb-1">Ubicación:</label>
            <input type="text" name="ubicacion_texto" required
                   class="w-full bg-gray-700 text-white px-3 py-2 rounded">
        </div>
        <div class="mb-6">
            <label class="block text-gray-300 mb-1">Embed de Google Maps:</label>
            <p class="text-gray-500 text-sm mb-1">Pegá acá el iframe de Google Maps</p>
            <textarea name="embed_mapa" rows="3"
                      class="w-full bg-gray-700 text-white px-3 py-2 rounded"></textarea>
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded">
            Crear evento
        </button>
    </form>
</div>
{% endblock %}
