{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-gray-800 rounded-xl">
    <h2 class="text-2xl font-bold mb-6 text-white">Iniciar Sesión</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="text-red-400 mb-4">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="mb-4">
            <label class="block text-gray-300 mb-1">Email:</label>
            <input type="email" name="email" required
                   class="w-full bg-gray-700 text-white px-3 py-2 rounded">
        </div>
        <div class="mb-6">
            <label class="block text-gray-300 mb-1">Contraseña:</label>
            <input type="password" name="password" required
                   class="w-full bg-gray-700 text-white px-3 py-2 rounded">
        </div>
        <button type="submit"
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 rounded">
            Entrar
        </button>
    </form>

    <p class="text-gray-400 mt-4">¿No tenés cuenta? 
        <a href="{{ url_for('auth.mostrar_registro') }}" class="text-yellow-400">Registrate</a>
    </p>
</div>
{% endblock %}
